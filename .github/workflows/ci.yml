name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libxkbcommon-dev pkg-config

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libxkbcommon-dev pkg-config gnome-keyring

      - name: Build
        run: cargo build --workspace

      # The keyring integration tests exercise the real OS credential store.
      # macOS (Keychain) and Windows (Credential Manager) provide one out of
      # the box; headless Linux needs a session bus with an unlocked
      # gnome-keyring providing org.freedesktop.secrets.
      - name: Test (Linux, under D-Bus session with unlocked keyring)
        if: runner.os == 'Linux'
        run: |
          dbus-run-session -- bash -c '
            echo -n "ci" | gnome-keyring-daemon --unlock --components=secrets
            cargo test --workspace
          '

      - name: Test
        if: runner.os != 'Linux'
        run: cargo test --workspace

  # ── Security audit ─────────────────────────────────────────────────────────
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    # rustsec/audit-check reports results via the Checks API, which needs
    # write access the default (read-only) GITHUB_TOKEN doesn't have.
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4
      # v2 ships a current cargo-audit, but the action itself (unlike the
      # cargo-audit CLI) does not read .cargo/audit.toml — its ignore list
      # must be passed as an input, kept in sync with that file and deny.toml.
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ignore: RUSTSEC-2023-0071,RUSTSEC-2026-0194,RUSTSEC-2026-0195

  # ── Dependency policy ──────────────────────────────────────────────────────
  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # v2 ships a current cargo-deny; deny.toml uses the 0.20 schema, which
      # v1's bundled binary cannot parse.
      - uses: EmbarkStudios/cargo-deny-action@v2
